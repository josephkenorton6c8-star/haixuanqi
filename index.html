<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞彩足球销售记录管理系统</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
    </script>

    <style>
        :root {
            --bg-deep: #08080f;
            --bg-card: #111119;
            --bg-card-hover: #161625;
            --bg-input: #1a1a28;
            --border-glow: #2a2a3d;
            --border-active: #b347ea;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a80;
            --accent-purple: #b347ea;
            --accent-pink: #ff5c8a;
            --accent-cyan: #00d4f0;
            --accent-amber: #f0a030;
            --accent-green: #2ecc71;
            --danger-red: #ff3b5c;
            --glow-purple: rgba(179, 71, 234, 0.3);
            --glow-pink: rgba(255, 92, 138, 0.3);
            --glow-cyan: rgba(0, 212, 240, 0.25);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--glow-purple);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(179, 71, 234, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(255, 92, 138, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 85%, rgba(0, 212, 240, 0.04) 0%, transparent 50%);
            background-attachment: fixed;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 40px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3d;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3d3d55;
        }

        /* ============ HEADER ============ */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-glow);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 20px var(--glow-purple);
            flex-shrink: 0;
        }
        .app-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #e0c0ff, #ffb0c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .beijing-time {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            background: rgba(0, 212, 240, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 240, 0.2);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-save {
            background: linear-gradient(135deg, var(--accent-purple), #8b2fc9);
            color: #fff;
            box-shadow: 0 0 20px var(--glow-purple);
        }
        .btn-save:hover {
            box-shadow: 0 0 35px rgba(179, 71, 234, 0.55);
            transform: translateY(-2px);
        }
        .btn-save:active {
            transform: scale(0.96);
        }
        .btn-save.auto-saving {
            background: linear-gradient(135deg, var(--accent-cyan), #0098b0);
            box-shadow: 0 0 20px var(--glow-cyan);
            animation: pulse-save 1.5s ease-in-out infinite;
        }
        @keyframes pulse-save {
            0%,
            100% {
                box-shadow: 0 0 20px var(--glow-cyan);
            }
            50% {
                box-shadow: 0 0 45px rgba(0, 212, 240, 0.6);
            }
        }
        .btn-login {
            background: transparent;
            border: 2px solid var(--accent-amber);
            color: var(--accent-amber);
        }
        .btn-login:hover {
            background: rgba(240, 160, 48, 0.1);
            box-shadow: 0 0 20px rgba(240, 160, 48, 0.25);
        }
        .btn-logout {
            background: transparent;
            border: 2px solid var(--danger-red);
            color: var(--danger-red);
        }
        .btn-logout:hover {
            background: rgba(255, 59, 92, 0.1);
            box-shadow: 0 0 20px rgba(255, 59, 92, 0.25);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.78rem;
            border-radius: 20px;
        }
        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s ease-in-out infinite;
        }
        .status-dot.saved {
            background: var(--accent-green);
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.6);
        }
        .status-dot.unsaved {
            background: var(--accent-amber);
            box-shadow: 0 0 8px rgba(240, 160, 48, 0.6);
            animation: blink-fast 0.6s ease-in-out infinite;
        }
        .status-dot.error {
            background: var(--danger-red);
            box-shadow: 0 0 8px rgba(255, 59, 92, 0.6);
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        @keyframes blink-fast {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.15;
            }
        }

        /* ============ MAIN CONTAINER ============ */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ============ CARDS ============ */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow);
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }
        .card:hover {
            border-color: #3a3a55;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e1e30;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-purple);
            box-shadow: 0 0 10px var(--glow-purple);
        }

        /* ============ SUMMARY GRID ============ */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        .summary-item {
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            border: 1px solid var(--border-glow);
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .summary-item::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 60%;
            height: 160%;
            background: radial-gradient(ellipse, rgba(179, 71, 234, 0.08) 0%, transparent 70%);
        }
        .summary-item:hover {
            border-color: #4a4a65;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .summary-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }
        .summary-value.negative {
            color: var(--danger-red);
            text-shadow: 0 0 15px rgba(255, 59, 92, 0.5);
        }
        .summary-value.positive {
            color: var(--accent-green);
            text-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }
        .summary-value.neutral {
            color: var(--accent-cyan);
        }

        /* ============ CHART AREA ============ */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-wrapper {
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 14px;
            border: 1px solid var(--border-glow);
            position: relative;
            min-height: 280px;
        }
        .chart-wrapper canvas {
            max-height: 320px;
        }
        .chart-title-sm {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ============ TABLE ============ */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            background: var(--bg-input);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
            font-size: 0.85rem;
        }
        thead th {
            background: #14141f;
            padding: 12px 8px;
            text-align: center;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            border-bottom: 2px solid #2a2a3d;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        tbody td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #1a1a2a;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            transition: var(--transition);
        }
        tbody tr {
            transition: var(--transition);
        }
        tbody tr:hover {
            background: rgba(179, 71, 234, 0.04);
        }
        tbody td.negative {
            color: var(--danger-red);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 59, 92, 0.35);
        }
        tbody td input {
            width: 80px;
            padding: 7px 4px;
            text-align: center;
            background: #0d0d18;
            border: 1px solid #2a2a3d;
            border-radius: 6px;
            color: #e8e8f0;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            transition: var(--transition);
        }
        tbody td input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 12px var(--glow-purple);
            background: #111125;
        }
        tbody td input.input-note {
            width: 120px;
            text-align: left;
        }
        .btn-table {
            padding: 5px 10px;
            border-radius: 14px;
            border: 1px solid #3a3a50;
            background: transparent;
            color: #c0c0d0;
            cursor: pointer;
            font-size: 0.7rem;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-table:hover {
            border-color: var(--accent-purple);
            background: rgba(179, 71, 234, 0.1);
            color: #fff;
        }
        .btn-table.danger:hover {
            border-color: var(--danger-red);
            background: rgba(255, 59, 92, 0.1);
            color: var(--danger-red);
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .badge-admin {
            background: rgba(179, 71, 234, 0.2);
            color: #c080ff;
            border: 1px solid rgba(179, 71, 234, 0.4);
        }
        .badge-guest {
            background: rgba(100, 100, 140, 0.2);
            color: #9090a8;
            border: 1px solid rgba(100, 100, 140, 0.4);
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-glow);
            padding: 28px 24px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), var(--shadow-glow);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .modal input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid #3a3a50;
            border-radius: 25px;
            color: #e8e8f0;
            font-size: 0.95rem;
            margin-bottom: 12px;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }
        .modal input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 18px var(--glow-purple);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .btn-modal {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .btn-modal.primary {
            background: linear-gradient(135deg, var(--accent-purple), #8b2fc9);
            color: #fff;
        }
        .btn-modal.primary:hover {
            box-shadow: 0 0 25px var(--glow-purple);
        }
        .btn-modal.secondary {
            background: transparent;
            border: 2px solid #4a4a60;
            color: #b0b0c0;
        }
        .btn-modal.secondary:hover {
            border-color: #707090;
            color: #fff;
        }
        .btn-modal.danger {
            background: transparent;
            border: 2px solid var(--danger-red);
            color: var(--danger-red);
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideInRight 0.35s ease, fadeOutRight 0.35s ease 2.5s forwards;
            pointer-events: auto;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.success {
            background: #1a3a1a;
            border: 1px solid var(--accent-green);
            color: #5dff8a;
        }
        .toast.error {
            background: #3a1a1a;
            border: 1px solid var(--danger-red);
            color: #ff6b7a;
        }
        .toast.info {
            background: #1a2a3a;
            border: 1px solid var(--accent-cyan);
            color: #7ae0ff;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(80%);
                opacity: 0;
            }
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header {
                padding: 10px 12px;
                gap: 8px;
            }
            .app-title {
                font-size: 1rem;
            }
            .beijing-time {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.78rem;
                border-radius: 20px;
            }
            .card {
                padding: 14px 10px;
                border-radius: var(--radius-md);
            }
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .summary-value {
                font-size: 1.2rem;
            }
            .summary-label {
                font-size: 0.68rem;
            }
            .table-container {
                border-radius: var(--radius-sm);
            }
            table {
                min-width: 900px;
                font-size: 0.7rem;
            }
            thead th {
                padding: 8px 4px;
                font-size: 0.65rem;
            }
            tbody td {
                padding: 7px 3px;
                font-size: 0.68rem;
            }
            tbody td input {
                width: 55px;
                padding: 5px 2px;
                font-size: 0.68rem;
            }
            tbody td input.input-note {
                width: 80px;
            }
            .chart-wrapper {
                min-height: 220px;
                padding: 8px;
            }
            .chart-wrapper canvas {
                max-height: 240px;
            }
            .modal {
                width: 95%;
                padding: 20px 16px;
                border-radius: var(--radius-lg);
            }
        }
        @media (max-width: 400px) {
            .summary-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .summary-item {
                padding: 10px 8px;
            }
            .summary-value {
                font-size: 1rem;
            }
            .btn {
                padding: 7px 10px;
                font-size: 0.7rem;
            }
            table {
                min-width: 750px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">⚽</div>
            <span class="app-title">竞彩足球销售记录</span>
            <span class="beijing-time" id="beijingTime">--</span>
            <span class="status-dot saved" id="saveStatusDot" title="保存状态"></span>
            <span style="font-size:0.7rem;color:var(--text-muted);" id="saveStatusText">已保存</span>
        </div>
        <div class="header-right">
            <span class="badge badge-guest" id="roleBadge">👁 游客模式</span>
            <button class="btn btn-login btn-sm" id="btnLogin" onclick="openLoginModal()">🔐 管理员登录</button>
            <button class="btn btn-logout btn-sm" id="btnLogout" onclick="logout()" style="display:none;">🚪 退出</button>
            <button class="btn btn-save btn-sm" id="btnCloudSave" onclick="manualSave()" title="一键云保存">☁️ 云保存</button>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="main-container" id="mainContainer">

        <!-- 店铺总结卡片 -->
        <div class="card" id="summaryCard">
            <div class="card-header">
                <span class="card-title"><span class="icon-dot"></span>📊 店铺总结（当月）</span>
                <span style="font-size:0.75rem;color:var(--text-muted);">数据实时计算</span>
            </div>
            <div class="summary-grid" id="summaryGrid">
                <div class="summary-item">
                    <div class="summary-label">实际结余</div>
                    <div class="summary-value neutral" id="sumActualBalance">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">店铺总兑奖</div>
                    <div class="summary-value" id="sumTotalPrize">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">店铺总实际业绩</div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        // ==================== FIREBASE INIT ====================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, orderBy, deleteDoc, writeBatch, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZeyd2pcjhHJTbMsmeCcxampRPusotxl8",
            authDomain: "haixuanqi-16ad1.firebaseapp.com",
            projectId: "haixuanqi-16ad1",
            storageBucket: "haixuanqi-16ad1.firebasestorage.app",
            messagingSenderId: "449619714205",
            appId: "1:449619714205:web:10ee25d0dc5022d783f474",
            measurementId: "G-E1B32ZW69Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==================== GLOBAL STATE ====================
        let isAdmin = false;
        let isDirty = false;
        let autoSaveTimer = null;
        let allEmployees = []; // {id, name}
        let currentRecords = []; // 当前日期下的记录
        let currentDateStr = ''; // YYYY-MM-DD 北京时间
        let charts = { employeePerf: null, dailyTrend: null };

        // ==================== DOM REFS ====================
        const $beijingTime = document.getElementById('beijingTime');
        const $saveStatusDot = document.getElementById('saveStatusDot');
        const $saveStatusText = document.getElementById('saveStatusText');
        const $roleBadge = document.getElementById('roleBadge');
        const $btnLogin = document.getElementById('btnLogin');
        const $btnLogout = document.getElementById('btnLogout');
        const $btnCloudSave = document.getElementById('btnCloudSave');
        const $dataTableCard = document.getElementById('dataTableCard');
        const $tableBody = document.getElementById('tableBody');
        const $selectedDate = document.getElementById('selectedDate');
        const $summaryGrid = document.getElementById('summaryGrid');
        const $loginModalOverlay = document.getElementById('loginModalOverlay');
        const $loginPassword = document.getElementById('loginPassword');
        const $employeeModalOverlay = document.getElementById('employeeModalOverlay');
        const $newEmployeeName = document.getElementById('newEmployeeName');
        const $employeeListContainer = document.getElementById('employeeListContainer');
        const $toastContainer = document.getElementById('toastContainer');

        // ==================== UTILS ====================
        function getBeijingDate() {
            const now = new Date();
            const beijing = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const y = beijing.getFullYear();
            const m = String(beijing.getMonth() + 1).padStart(2, '0');
            const d = String(beijing.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getBeijingDateTimeStr() {
            const now = new Date();
            const beijing = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const y = beijing.getFullYear();
            const m = String(beijing.getMonth() + 1).padStart(2, '0');
            const d = String(beijing.getDate()).padStart(2, '0');
            const h = String(beijing.getHours()).padStart(2, '0');
            const min = String(beijing.getMinutes()).padStart(2, '0');
            const s = String(beijing.getSeconds()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }

        function updateBeijingTimeDisplay() {
            $beijingTime.textContent = '🕐 ' + getBeijingDateTimeStr() + ' (北京时间)';
        }

        function getMonthKey(dateStr) {
            return dateStr.substring(0, 7); // YYYY-MM
        }

        function formatMoney(val) {
            const num = parseFloat(val);
            if (isNaN(num)) return '¥0';
            return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function parseNum(val) {
            const n = parseFloat(val);
            return isNaN(n) ? 0 : n;
        }

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            $toastContainer.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 3000);
        }

        // ==================== FIREBASE OPERATIONS ====================
        async function loadEmployees() {
            try {
                const snap = await getDocs(collection(db, 'employees'));
                allEmployees = [];
                snap.forEach(doc => {
                    allEmployees.push({ id: doc.id, name: doc.data().name });
                });
                allEmployees.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
            } catch (e) {
                console.error('加载员工失败:', e);
                allEmployees = [];
            }
        }

        async function addEmployeeToDB(name) {
            const docRef = doc(collection(db, 'employees'));
            await setDoc(docRef, { name: name.trim(), createdAt: getBeijingDateTimeStr() });
            await loadEmployees();
        }

        async function updateEmployeeNameDB(empId, newName) {
            await setDoc(doc(db, 'employees', empId), { name: newName.trim(), updatedAt: getBeijingDateTimeStr() },
                { merge: true });
            await loadEmployees();
        }

        async function deleteEmployeeDB(empId) {
            await deleteDoc(doc(db, 'employees', empId));
            // 同时删除该员工的所有记录
            const snap = await getDocs(collection(db, 'dailyRecords'));
            const batch = writeBatch(db);
            snap.forEach(d => {
                if (d.data().employeeId === empId) {
                    batch.delete(doc(db, 'dailyRecords', d.id));
                }
            });
            await batch.commit();
            await loadEmployees();
        }

        async function loadRecordsForDate(dateStr) {
            if (!dateStr) dateStr = currentDateStr;
            if (!dateStr) return;
            currentDateStr = dateStr;
            $selectedDate.value = dateStr;
            currentRecords = [];
            try {
                const q = query(collection(db, 'dailyRecords'), where('date', '==', dateStr));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    currentRecords.push({ id: d.id, ...d.data() });
                });
            } catch (e) {
                console.error('加载记录失败:', e);
                currentRecords = [];
            }
            renderTable();
            updateAllCalculations();
            updateCharts();
        }

        async function saveRecord(recordData) {
            const docId = recordData.id || `${recordData.date}_${recordData.employeeId}`;
            const ref = doc(db, 'dailyRecords', docId);
            await setDoc(ref, recordData, { merge: true });
            isDirty = false;
            updateSaveStatus('saved');
        }

        async function saveAllCurrentRecords() {
            if (currentRecords.length === 0 && !isDirty) return;
            const batch = writeBatch(db);
            const savedIds = new Set();
            for (const rec of currentRecords) {
                const docId = rec.id || `${rec.date}_${rec.employeeId}`;
                const ref = doc(db, 'dailyRecords', docId);
                batch.set(ref, {
                    date: rec.date,
                    employeeId: rec.employeeId,
                    employeeName: rec.employeeName,
                    orderCount: parseNum(rec.orderCount),
                    newCustomerCount: parseNum(rec.newCustomerCount),
                    performance: parseNum(rec.performance),
                    prizeAmount: parseNum(rec.prizeAmount),
                    actualPerformance: parseNum(rec.actualPerformance),
                    expense: parseNum(rec.expense),
                    expenseNote: rec.expenseNote || '',
                    balance: parseNum(rec.balance),
                    note: rec.note || '',
                    updatedAt: getBeijingDateTimeStr(),
                }, { merge: true });
                savedIds.add(docId);
            }
            // 删除不在当前记录中的该日期的旧记录
            const snap = await getDocs(query(collection(db, 'dailyRecords'), where('date', '==', currentDateStr)));
            snap.forEach(d => {
                if (!savedIds.has(d.id) && currentRecords.findIndex(r => (r.id || `${r.date}_${r.employeeId}`) ===
                        d.id) === -1) {
                    // 检查是否应该删除（员工已不在当前记录中）
                    const stillExists = currentRecords.some(r => (r.id || `${r.date}_${r.employeeId}`) === d
                        .id);
                    if (!stillExists && d.data().date === currentDateStr) {
                        batch.delete(doc(db, 'dailyRecords', d.id));
                    }
                }
            });
            await batch.commit();
            isDirty = false;
            updateSaveStatus('saved');
            showToast('✅ 数据已云保存成功', 'success');
            await loadRecordsForDate(currentDateStr);
        }

        async function loadMonthRecords(monthKey) {
            const records = [];
            try {
                const snap = await getDocs(collection(db, 'dailyRecords'));
                snap.forEach(d => {
                    const data = d.data();
                    if (data.date && data.date.startsWith(monthKey)) {
                        records.push({ id: d.id, ...data });
                    }
                });
            } catch (e) {
                console.error('加载月度记录失败:', e);
            }
            return records;
        }

        async function getAdminPassword() {
            try {
                const docSnap = await getDoc(doc(db, 'settings', 'admin'));
                if (docSnap.exists()) {
                    return docSnap.data().password || 'admin123';
                }
                // 初始化默认密码
                await setDoc(doc(db, 'settings', 'admin'), { password: 'admin123' });
                return 'admin123';
            } catch (e) {
                console.error('获取密码失败:', e);
                return 'admin123';
            }
        }

        // ==================== UI UPDATE ====================
        function updateSaveStatus(status) {
            $saveStatusDot.className = 'status-dot ' + status;
            if (status === 'saved') {
                $saveStatusText.textContent = '已保存';
                $btnCloudSave.textContent = '☁️ 云保存';
                $btnCloudSave.classList.remove('auto-saving');
            } else if (status === 'unsaved') {
                $saveStatusText.textContent = '未保存';
                $btnCloudSave.textContent = '☁️ 云保存';
                $btnCloudSave.classList.remove('auto-saving');
            } else if (status === 'auto-saving') {
                $saveStatusText.textContent = '自动保存中...';
                $btnCloudSave.textContent = '🔄 保存中';
                $btnCloudSave.classList.add('auto-saving');
            } else if (status === 'error') {
                $saveStatusText.textContent = '保存失败';
                $btnCloudSave.textContent = '⚠️ 重试';
                $btnCloudSave.classList.remove('auto-saving');
            }
        }

        function markDirty() {
            if (!isAdmin) return;
            isDirty = true;
            updateSaveStatus('unsaved');
            resetAutoSaveTimer();
        }

        function resetAutoSaveTimer() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                if (isDirty && isAdmin) {
                    updateSaveStatus('auto-saving');
                    saveAllCurrentRecords().then(() => {
                        updateSaveStatus('saved');
                    }).catch(() => {
                        updateSaveStatus('error');
                    });
                }
            }, 5000);
        }

        function updateAdminUI() {
            if (isAdmin) {
                $dataTableCard.style.display = '';
                $btnLogin.style.display = 'none';
                $btnLogout.style.display = '';
                $roleBadge.textContent = '🔧 管理员模式';
                $roleBadge.className = 'badge badge-admin';
            } else {
                $dataTableCard.style.display = 'none';
                $btnLogin.style.display = '';
                $btnLogout.style.display = 'none';
                $roleBadge.textContent = '👁 游客模式';
                $roleBadge.className = 'badge badge-guest';
            }
        }

        // ==================== TABLE RENDERING ====================
        function renderTable() {
            if (!isAdmin) {
                $tableBody.innerHTML = `
                <tr class="empty-state">
                  <td colspan="12">
                    <div class="icon">🔒</div>
                    <p>请登录管理员账号以查看和编辑数据</p>
                  </td>
                </tr>`;
                return;
            }
            if (currentRecords.length === 0 && allEmployees.length === 0) {
                $tableBody.innerHTML = `
                <tr class="empty-state">
                  <td colspan="12">
                    <div class="icon">📭</div>
                    <p>暂无员工，请先添加员工，然后选择日期添加记录</p>
                  </td>
                </tr>`;
                return;
            }
            // 确保每个员工在当前日期都有记录行
            const recordMap = {};
            currentRecords.forEach(r => { recordMap[r.employeeId] = r; });

            let html = '';
            allEmployees.forEach(emp => {
                const rec = recordMap[emp.id] || {
                    date: currentDateStr,
                    employeeId: emp.id,
                    employeeName: emp.name,
                    orderCount: 0,
                    newCustomerCount: 0,
                    performance: 0,
                    prizeAmount: 0,
                    actualPerformance: 0,
                    expense: 0,
                    expenseNote: '',
                    balance: 0,
                    note: '',
                };
                const orderCount = parseNum(rec.orderCount);
                const newCust = parseNum(rec.newCustomerCount);
                const perf = parseNum(rec.performance);
                const prize = parseNum(rec.prizeAmount);
                const actualPerf = perf - prize;
                const expense = parseNum(rec.expense);
                const balance = actualPerf - expense;
                const monthTotalPerf = computeEmployeeMonthTotal(emp.id, perf);

                html += `
                <tr data-employee-id="${emp.id}" data-record-id="${rec.id || ''}">
                  <td><strong>${emp.name}</strong></td>
                  <td><input type="number" value="${orderCount}" data-field="orderCount" step="1" min="0" onchange="onCellChange(this)" onfocus="this.select()"></td>
                  <td><input type="number" value="${newCust}" data-field="newCustomerCount" step="1" min="0" onchange="onCellChange(this)" onfocus="this.select()"></td>
                  <td><input type="number" value="${perf}" data-field="performance" step="0.01" onchange="onCellChange(this)" onfocus="this.select()"></td>
                  <td><input type="number" value="${prize}" data-field="prizeAmount" step="0.01" onchange="onCellChange(this)" onfocus="this.select()"></td>
                  <td class="${actualPerf < 0 ? 'negative' : ''}">${formatMoney(actualPerf)}</td>
                  <td><strong>${formatMoney(monthTotalPerf)}</strong></td>
                  <td><input type="number" value="${expense}" data-field="expense" step="0.01" onchange="onCellChange(this)" onfocus="this.select()"></td>
                  <td><input type="text" value="${rec.expenseNote || ''}" data-field="expenseNote" class="input-note" onchange="onCellChange(this)" placeholder="支出备注"></td>
                  <td class="${balance < 0 ? 'negative' : ''}">${formatMoney(balance)}</td>
                  <td><input type="text" value="${rec.note || ''}" data-field="note" class="input-note" onchange="onCellChange(this)" placeholder="备注"></td>
                  <td>
                    <button class="btn-table danger" onclick="deleteRecordRow(this)" title="删除此记录">🗑</button>
                  </td>
                </tr>`;
            });
            $tableBody.innerHTML = html;
        }

        function computeEmployeeMonthTotal(empId, currentDayPerf) {
            const monthKey = getMonthKey(currentDateStr);
            let total = 0;
            // 从当前记录中累加当月其他日期的业绩
            currentRecords.forEach(r => {
                if (r.employeeId === empId && r.date && r.date.startsWith(monthKey)) {
                    total += parseNum(r.performance);
                }
            });
            // 如果当前记录中该员工在当月没有其他记录，total就是0，但当前日期业绩需要计入
            // 实际上这里用于表格显示当月总业绩，需要累加当月所有记录
            // 简化处理：从所有已加载的当月记录中计算
            return total;
        }

        // 更准确的当月总业绩计算（需要查询当月所有记录）
        async function getEmployeeMonthTotalAccurate(empId) {
            const monthKey = getMonthKey(currentDateStr);
            const allMonthRecords = await loadMonthRecords(monthKey);
            let total = 0;
            allMonthRecords.forEach(r => {
                if (r.employeeId === empId) {
                    total += parseNum(r.performance);
                }
            });
            return total;
        }

        window.onCellChange = function(inputEl) {
            if (!isAdmin) return;
            const row = inputEl.closest('tr');
            const empId = row.dataset.employeeId;
            const field = inputEl.dataset.field;
            const value = inputEl.value;

            // 更新或创建记录
            let rec = currentRecords.find(r => r.employeeId === empId);
            if (!rec) {
                const emp = allEmployees.find(e => e.id === empId);
                rec = {
                    date: currentDateStr,
                    employeeId: empId,
                    employeeName: emp ? emp.name : '',
                    orderCount: 0,
                    newCustomerCount: 0,
                    performance: 0,
                    prizeAmount: 0,
                    actualPerformance: 0,
                    expense: 0,
                    expenseNote: '',
                    balance: 0,
                    note: '',
                };
                currentRecords.push(rec);
            }
            if (field === 'orderCount' || field === 'newCustomerCount') {
                rec[field] = parseInt(value) || 0;
            } else if (field === 'performance' || field === 'prizeAmount' || field === 'expense') {
                rec[field] = parseFloat(value) || 0;
            } else {
                rec[field] = value;
            }
            // 重新计算
            rec.actualPerformance = parseNum(rec.performance) - parseNum(rec.prizeAmount);
            rec.balance = rec.actualPerformance - parseNum(rec.expense);
            markDirty();
            renderTable();
            updateAllCalculations();
            updateCharts();
        };

        window.deleteRecordRow = function(btn) {
            if (!isAdmin) return;
            if (!confirm('确定删除该员工的此日记录吗？')) return;
            const row = btn.closest('tr');
            const empId = row.dataset.employeeId;
            currentRecords = currentRecords.filter(r => r.employeeId !== empId);
            markDirty();
            renderTable();
            updateAllCalculations();
            updateCharts();
            showToast('记录已标记删除，请点击云保存', 'info');
        };

        window.addEmployeeRow = function() {
            if (!isAdmin) return;
            if (allEmployees.length === 0) {
                showToast('请先添加员工', 'error');
                openEmployeeManageModal();
                return;
            }
            // 检查是否所有员工都已经有记录
            const existingEmpIds = new Set(currentRecords.map(r => r.employeeId));
            const missingEmp = allEmployees.find(e => !existingEmpIds.has(e.id));
            if (missingEmp) {
                const newRec = {
                    date: currentDateStr,
                    employeeId: missingEmp.id,
                    employeeName: missingEmp.name,
                    orderCount: 0,
                    newCustomerCount: 0,
                    performance: 0,
                    prizeAmount: 0,
                    actualPerformance: 0,
                    expense: 0,
                    expenseNote: '',
                    balance: 0,
                    note: '',
                };
                currentRecords.push(newRec);
                markDirty();
                renderTable();
                updateAllCalculations();
                updateCharts();
            } else {
                showToast('所有员工已有当日记录', 'info');
            }
        };

        // ==================== SUMMARY CALCULATIONS ====================
        async function updateAllCalculations() {
            const monthKey = getMonthKey(currentDateStr);
            const allMonthRecords = await loadMonthRecords(monthKey);

            // 所有员工当月总业绩（累加每日performance）
            let totalAllPerf = 0;
            let totalPrize = 0;
            let totalExpense = 0;
            let totalActualPerf = 0;
            // 按日期分组计算
            const dateGroup = {};
            allMonthRecords.forEach(r => {
                const d = r.date;
                if (!dateGroup[d]) dateGroup[d] = { perf: 0, prize: 0, expense: 0, actualPerf: 0, balance: 0 };
                dateGroup[d].perf += parseNum(r.performance);
                dateGroup[d].prize += parseNum(r.prizeAmount);
                dateGroup[d].expense += parseNum(r.expense);
                dateGroup[d].actualPerf += parseNum(r.actualPerformance);
                dateGroup[d].balance += parseNum(r.balance);
            });

            // 累计当月
            const sortedDates = Object.keys(dateGroup).sort();
            let runningBalance = 0;
            for (const d of sortedDates) {
                totalAllPerf += dateGroup[d].perf;
                totalPrize += dateGroup[d].prize;
                totalExpense += dateGroup[d].expense;
                totalActualPerf += dateGroup[d].actualPerf;
                runningBalance += dateGroup[d].balance;
            }

            const actualBalance = runningBalance;
            const storeTotalActualPerf = totalAllPerf - totalPrize;

            // 更新UI
            document.getElementById('sumActualBalance').textContent = formatMoney(actualBalance);
            document.getElementById('sumActualBalance').className = 'summary-value ' + (actualBalance < 0 ? 'negative' :
                actualBalance > 0 ? 'positive' : 'neutral');
            document.getElementById('sumTotalPrize').textContent = formatMoney(totalPrize);
            document.getElementById('sumTotalPrize').className = 'summary-value ' + (totalPrize > 0 ? '' : 'neutral');
            document.getElementById('sumTotalActualPerf').textContent = formatMoney(storeTotalActualPerf);
            document.getElementById('sumTotalActualPerf').className = 'summary-value ' + (storeTotalActualPerf < 0 ?
                'negative' : storeTotalActualPerf > 0 ? 'positive' : 'neutral');
            document.getElementById('sumTotalExpense').textContent = formatMoney(totalExpense);
            document.getElementById('sumTotalExpense').className = 'summary-value ' + (totalExpense > 0 ? '' : 'neutral');
            document.getElementById('sumTotalPerf').textContent = formatMoney(totalAllPerf);
            document.getElementById('sumTotalPerf').className = 'summary-value ' + (totalAllPerf > 0 ? 'positive' :
                'neutral');
        }

        // ==================== CHARTS ====================
        async function updateCharts() {
            const monthKey = getMonthKey(currentDateStr);
            const allMonthRecords = await loadMonthRecords(monthKey);

            // Chart 1: 员工当月业绩对比
            const empPerfMap = {};
            allEmployees.forEach(e => { empPerfMap[e.id] = { name: e.name, perf: 0 }; });
            allMonthRecords.forEach(r => {
                if (empPerfMap[r.employeeId]) {
                    empPerfMap[r.employeeId].perf += parseNum(r.performance);
                }
            });
            const empLabels = Object.values(empPerfMap).map(e => e.name);
            const empData = Object.values(empPerfMap).map(e => e.perf);
            const empColors = empData.map(v => v < 0 ? 'rgba(255,59,92,0.8)' : 'rgba(179,71,234,0.7)');

            const ctx1 = document.getElementById('chartEmployeePerf').getContext('2d');
            if (charts.employeePerf) charts.employeePerf.destroy();
            charts.employeePerf = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: empLabels.length > 0 ? empLabels : ['暂无数据'],
                    datasets: [{
                        label: '当月总业绩',
                        data: empData.length > 0 ? empData : [0],
                        backgroundColor: empColors,
                        borderColor: empColors.map(c => c.replace('0.7', '1').replace('0.8', '1')),
                        borderWidth: 1.5,
                        borderRadius: 8,
                        borderSkipped: false,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: true, labels: { color: '#a0a0b8', font: { size: 11 } } },
                    },
                    scales: {
                        x: {
                            ticks: { color: '#8a8a9a', font: { size: 10 }, maxRotation: 45 },
                            grid: { color: 'rgba(255,255,255,0.03)' },
                        },
                        y: {
                            ticks: {
                                color: '#8a8a9a',
                                font: { size: 10 },
                                callback: v => formatMoney(v),
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                    },
                },
            });

            // Chart 2: 店铺每日业绩趋势
            const dateGroup = {};
            allMonthRecords.forEach(r => {
                if (!dateGroup[r.date]) dateGroup[r.date] = { perf: 0, prize: 0, balance: 0 };
                dateGroup[r.date].perf += parseNum(r.performance);
                dateGroup[r.date].prize += parseNum(r.prizeAmount);
                dateGroup[r.date].balance += parseNum(r.balance);
            });
            const sortedDates = Object.keys(dateGroup).sort();
            const trendLabels = sortedDates.length > 0 ? sortedDates : ['暂无数据'];
            const trendPerf = sortedDates.map(d => dateGroup[d].perf);
            const trendPrize = sortedDates.map(d => dateGroup[d].prize);
            const trendBalance = sortedDates.map(d => dateGroup[d].balance);

            const ctx2 = document.getElementById('chartDailyTrend').getContext('2d');
            if (charts.dailyTrend) charts.dailyTrend.destroy();
            charts.dailyTrend = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: trendLabels,
                    datasets: [
                        {
                            label: '日总业绩',
                            data: trendPerf.length > 0 ? trendPerf : [0],
                            borderColor: '#b347ea',
                            backgroundColor: 'rgba(179,71,234,0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#b347ea',
                            borderWidth: 2,
                        },
                        {
                            label: '日总兑奖',
                            data: trendPrize.length > 0 ? trendPrize : [0],
                            borderColor: '#ff5c8a',
                            backgroundColor: 'rgba(255,92,138,0.08)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#ff5c8a',
                            borderWidth: 2,
                        },
                        {
                            label: '日总结余',
                            data: trendBalance.length > 0 ? trendBalance : [0],
                            borderColor: '#00d4f0',
                            backgroundColor: 'rgba(0,212,240,0.05)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#00d4f0',
                            borderWidth: 2,
                            borderDash: [5, 3],
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: true, labels: { color: '#a0a0b8', font: { size: 10 }, usePointStyle: true,
                                pointStyleWidth: 8 } },
                    },
                    scales: {
                        x: {
                            ticks: { color: '#8a8a9a', font: { size: 9 }, maxRotation: 45 },
                            grid: { color: 'rgba(255,255,255,0.03)' },
                        },
                        y: {
                            ticks: {
                                color: '#8a8a9a',
                                font: { size: 10 },
                                callback: v => formatMoney(v),
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                    },
                },
            });
        }

        // ==================== MODALS ====================
        window.openLoginModal = function() {
            $loginModalOverlay.style.display = 'flex';
            $loginPassword.value = '';
            setTimeout(() => $loginPassword.focus(), 150);
        };

        window.closeLoginModal = function() {
            $loginModalOverlay.style.display = 'none';
        };

        window.adminLogin = async function() {
            const pw = $loginPassword.value.trim();
            const correctPw = await getAdminPassword();
            if (pw === correctPw) {
                isAdmin = true;
                updateAdminUI();
                closeLoginModal();
                showToast('✅ 管理员登录成功', 'success');
                await loadEmployees();
                await loadRecordsForDate(currentDateStr);
                renderTable();
                updateAllCalculations();
                updateCharts();
                // 持久化登录状态
                sessionStorage.setItem('isAdmin', 'true');
            } else {
                showToast('❌ 密码错误', 'error');
                $loginPassword.value = '';
                $loginPassword.focus();
            }
        };

        window.logout = function() {
            isAdmin = false;
            sessionStorage.removeItem('isAdmin');
            updateAdminUI();
            currentRecords = [];
            renderTable();
            updateAllCalculations();
            updateCharts();
            showToast('已退出管理员模式', 'info');
        };

        window.openEmployeeManageModal = function() {
            if (!isAdmin) return;
            $employeeModalOverlay.style.display = 'flex';
            $newEmployeeName.value = '';
            renderEmployeeList();
        };

        window.closeEmployeeModal = function() {
            $employeeModalOverlay.style.display = 'none';
        };

        function renderEmployeeList() {
            if (allEmployees.length === 0) {
                $employeeListContainer.innerHTML =
                    '<p style="color:var(--text-muted);text-align:center;">暂无员工，请添加</p>';
                return;
            }
            let html = '';
            allEmployees.forEach(emp => {
                html += `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #1e1e30;gap:8px;">
                  <input type="text" value="${emp.name}" data-emp-id="${emp.id}" class="emp-name-input" style="flex:1;padding:7px 10px;background:var(--bg-input);border:1px solid #2a2a3d;border-radius:6px;color:#e8e8f0;font-size:0.82rem;" onchange="updateEmployeeName(this)">
                  <button class="btn-table danger" onclick="deleteEmployeeConfirm('${emp.id}')" title="删除员工">🗑</button>
                </div>`;
            });
            $employeeListContainer.innerHTML = html;
        }

        window.updateEmployeeName = async function(inputEl) {
            const empId = inputEl.dataset.empId;
            const newName = inputEl.value.trim();
            if (!newName) {
                showToast('姓名不能为空', 'error');
                renderEmployeeList();
                return;
            }
            await updateEmployeeNameDB(empId, newName);
            showToast('姓名已更新', 'success');
            renderEmployeeList();
            renderTable();
            markDirty();
        };

        window.deleteEmployeeConfirm = async function(empId) {
            if (!confirm('确定删除该员工及其所有记录吗？此操作不可撤销！')) return;
            await deleteEmployeeDB(empId);
            currentRecords = currentRecords.filter(r => r.employeeId !== empId);
            showToast('员工已删除', 'info');
            renderEmployeeList();
            renderTable();
            markDirty();
            updateAllCalculations();
            updateCharts();
        };

        window.addEmployee = async function() {
            const name = $newEmployeeName.value.trim();
            if (!name) {
                showToast('请输入员工姓名', 'error');
                return;
            }
            // 检查重复
            if (allEmployees.some(e => e.name === name)) {
                showToast('该员工已存在', 'error');
                return;
            }
            await addEmployeeToDB(name);
            $newEmployeeName.value = '';
            showToast('✅ 员工添加成功', 'success');
            renderEmployeeList();
            markDirty();
        };

        window.loadRecordsForDate = function() {
            const dateVal = $selectedDate.value;
            if (dateVal) {
                currentDateStr = dateVal;
                loadRecordsForDate(dateVal);
            }
        };

        // ==================== MANUAL SAVE ====================
        window.manualSave = async function() {
            if (!isAdmin) {
                showToast('游客模式无法保存', 'error');
                return;
            }
            updateSaveStatus('auto-saving');
            try {
                await saveAllCurrentRecords();
                updateSaveStatus('saved');
                showToast('✅ 数据已云保存成功', 'success');
            } catch (e) {
                updateSaveStatus('error');
                showToast('❌ 保存失败：' + e.message, 'error');
                console.error(e);
            }
        };

        // ==================== INIT ====================
        async function init() {
            updateBeijingTimeDisplay();
            setInterval(updateBeijingTimeDisplay, 1000);

            currentDateStr = getBeijingDate();
            $selectedDate.value = currentDateStr;

            // 检查sessionStorage中的登录状态
            const savedAdmin = sessionStorage.getItem('isAdmin');
            if (savedAdmin === 'true') {
                isAdmin = true;
            }

            updateAdminUI();
            await loadEmployees();

            if (isAdmin) {
                await loadRecordsForDate(currentDateStr);
                renderTable();
            } else {
                // 游客模式也加载数据用于图表
                await loadRecordsForDate(currentDateStr);
                renderTable();
            }

            await updateAllCalculations();
            await updateCharts();

            // 5秒自动保存定时器
            setInterval(() => {
                if (isDirty && isAdmin) {
                    updateSaveStatus('auto-saving');
                    saveAllCurrentRecords().then(() => {
                        updateSaveStatus('saved');
                    }).catch(() => {
                        updateSaveStatus('error');
                    });
                }
            }, 5000);

            // 点击弹窗遮罩关闭
            $loginModalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeLoginModal();
            });
            $employeeModalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeEmployeeModal();
            });

            // 回车键登录
            $loginPassword.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') adminLogin();
            });

            // 页面关闭前提醒
            window.addEventListener('beforeunload', function(e) {
                if (isDirty && isAdmin) {
                    e.preventDefault();
                    e.returnValue = '有未保存的数据，确定离开吗？';
                    return e.returnValue;
                }
            });

            console.log('⚽ 竞彩足球销售记录管理系统已就绪');
            console.log('  北京时间：' + getBeijingDateTimeStr());
            console.log('  模式：' + (isAdmin ? '管理员' : '游客'));
            console.log('  自动云保存：每5秒（数据变更时）');
        }

        init();
    </script>
</body>
</html>
